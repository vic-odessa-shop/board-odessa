<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Нове оголошення</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="form-page">
    <div class="container glass">
        <div class="form-header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h3>Подати оголошення</h3>
        </div>

        <form id="adForm">
            <label>Категорія:</label>
            <select name="title" id="jobTitle" required>
                <option value="Водій">Водій</option>
                <option value="Кухар">Кухар</option>
                <option value="Продавець">Продавець</option>
                <option value="Офіс/Менеджер">Офіс / Менеджер</option>
                <option value="Інше">Інше (своя назва)</option>
            </select>

            <input type="text" name="salary" placeholder="Зарплата (напр. 25000)" required>
            <input type="text" name="city" value="Одеса" required>
            <textarea name="duties" placeholder="Обов’язки та умови роботи..." required></textarea>
            
            <div class="contact-group">
                <input type="tel" name="phone" placeholder="Ваш телефон" required>
                <input type="text" name="person" placeholder="Як до вас звертатися?" required>
            </div>
            
            <div class="payment-options">
                <label>Спосіб оплати:</label>
                <select name="payMethod" id="payMethod">
                    <option value="card">💳 Картка (Швидко)</option>
                    <option value="iban">🏦 IBAN (Для бізнесу)</option>
                    <option value="phone">📱 На мобільний (Без комісії)</option>
                </select>
            </div>

            <div class="price-block">
                <div class="vip-check">
                    <input type="checkbox" name="isVip" id="isVip" onchange="calcPrice()">
                    <label for="isVip">💎 VIP статус (+150 грн)</label>
                </div>
                <div class="total-price">До сплати: <span id="totalSum">400</span> грн</div>
            </div>

            <button type="submit" class="submit-btn">Опублікувати та сплатити</button>
        </form>
    </div>

    <div id="payModal" class="modal">
        <div class="modal-content glass pay-box">
            <h4>💳 Оплата замовлення</h4>
            <p id="orderIdText" class="order-id"></p>
            <div class="bank-card">
                <span id="bankLabel">ПриватБанк</span>
                <div class="card-number-row">
                    <code id="cardNumber">0000 0000 0000 0000</code>
                    <button type="button" onclick="copyCard()">📋</button>
                </div>
            </div>
            <p class="pay-sum">Сума: <b id="finalSum">0</b> грн</p>
            <div class="pay-instr">
                1. Сплатіть вказану суму.<br>
                2. Надішліть скріншот боту @admin_odessa.<br>
                3. Контакти відкриються після перевірки.
            </div>
            <button class="main-add-btn" onclick="closePay()">Зрозумів</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let prices = { d30: 400, vip: 150 }; // Дефолтные значения

        async function init() {
            tg.expand();
            try {
                const res = await fetch('/api/init');
                const data = await res.json();
                if(data.prices) prices = data.prices;
            } catch(e) {}
            calcPrice();
        }

        function calcPrice() {
            let sum = prices.d30;
            if (document.getElementById('isVip').checked) sum += prices.vip;
            document.getElementById('totalSum').innerText = sum;
        }

        document.getElementById('adForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.isVip = document.getElementById('isVip').checked;
            data.userId = tg.initDataUnsafe?.user?.id || 'web-' + Math.random().toString(36).slice(2, 7);
            data.totalSum = document.getElementById('totalSum').innerText;

            const res = await fetch('/api/ads/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const resData = await res.json();
            
            // Заполняем модалку данными от сервера (из ротатора)
            document.getElementById('orderIdText').innerText = `Замовлення: ${resData.id}`;
            document.getElementById('bankLabel').innerText = resData.wallet.label;
            document.getElementById('cardNumber').innerText = resData.wallet.number;
            document.getElementById('finalSum').innerText = data.totalSum;
            
            document.getElementById('payModal').style.display = 'block';
        };

        function copyCard() {
            const num = document.getElementById('cardNumber').innerText;
            navigator.clipboard.writeText(num);
            tg.showAlert('Номер копійовано!');
        }

        function closePay() {
            tg.close(); // Закрываем Web App и возвращаемся в чат к боту
        }

        init();
    </script>
</body>
</html>
