<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Робота Одеса ⚓</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main: #007bff; --bg: #f4f6f9; --text: #1a1a1a; --gold: #ffc107; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        header { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 20px 15px; text-align: center; border-radius: 0 0 25px 25px; }
        .logo-text { font-size: 24px; font-weight: 800; font-style: italic; }
        
        .search-panel { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 10px; }
        .search-box { display: flex; gap: 8px; background: white; padding: 5px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; margin: 0 10px; }
        .search-box input { flex: 1; border: none; padding: 10px 15px; outline: none; font-size: 16px; border-radius: 30px; }
        .btn-search { background: var(--main); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; cursor: pointer; }

        /* СЛАЙДЕРЫ (Меню и VIP) */
        .slider-wrapper { 
            display: flex; gap: 12px; padding: 10px 15px; 
            overflow-x: auto; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y !important; /* Разрешает вертикальный скролл страницы */
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }

        .cat-btn { background: white; border: 1px solid #ddd; padding: 10px 18px; border-radius: 20px; white-space: nowrap; font-size: 13px; font-weight: 600; cursor: pointer; }
        .cat-btn.active { background: var(--main); color: white; border-color: var(--main); }

        .vip-panel { background: #fff; padding: 15px 0; margin: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .vip-card { min-width: 240px; background: #fffdf0; border: 2px solid var(--gold); border-radius: 18px; padding: 15px; position: relative; flex-shrink: 0; cursor: pointer; }
        .vip-tag { position: absolute; top: 10px; right: 10px; background: var(--gold); color: #856404; font-size: 9px; padding: 2px 6px; border-radius: 5px; font-weight: bold; }

        .container { padding: 0 15px; min-height: 300px; }
        .ad-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #eaeaea; cursor: pointer; display: block !important; }
        .salary { color: #28a745; font-weight: 800; font-size: 20px; margin: 8px 0; }
        
        .promo-item { background: #fff3cd; border: 1px dashed #ffc107; padding: 12px; border-radius: 15px; text-align: center; font-size: 13px; margin-bottom: 15px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-link { text-decoration: none; color: #777; font-size: 11px; text-align: center; }
        .add-btn { background: var(--main); color: white !important; padding: 10px 20px; border-radius: 25px; font-weight: bold; margin-top: -8px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-height: 85%; border-radius: 25px; padding: 25px; position: relative; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">⚓ РОБОТА ОДЕСА ⚓</div>
</header>

<div class="search-panel">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Пошук вакансії...">
        <button class="btn-search" onclick="searchAds()">🔍</button>
    </div>
</div>

<div class="slider-wrapper drag-scroll" id="catList">
    <button class="cat-btn active" onclick="filterCat('Усі', this)">Усі вакансії</button>
    <button class="cat-btn" onclick="filterCat('Автобізнес - Сервісне обслуговування', this)">🚗 Автобізнес</button>
    <button class="cat-btn" onclick="filterCat('Банки, Фінанси', this)">💰 Банки / Фінанси</button>
    <button class="cat-btn" onclick="filterCat('Медицина, фармацевтика', this)">💊 Медицина</button>
    <button class="cat-btn" onclick="filterCat('Нерухомість', this)">🏠 Нерухомість</button>
    <button class="cat-btn" onclick="filterCat('IT, комп\'ютери, інтернет', this)">💻 IT / Інтернет</button>
    <button class="cat-btn" onclick="filterCat('Охорона - Безпека', this)">🛡️ Охорона</button>
    <button class="cat-btn" onclick="filterCat('Клінінг', this)">🧹 Клінінг</button>
    <button class="cat-btn" onclick="filterCat('Ресторани - Кафе', this)">🍕 Ресторани / Кафе</button>
    <button class="cat-btn" onclick="filterCat('Ремонт', this)">🛠️ Ремонт</button>
    <button class="cat-btn" onclick="filterCat('Торгівля', this)">🛒 Торгівля</button>
    <button class="cat-btn" onclick="filterCat('Інше', this)">📁 Інше</button>
</div>

<div class="container">
    <div class="promo-container" id="promoList">
        <div class="promo-item">📢 <b>РЕКЛАМА №1:</b> Найкращі кав'ярні міста!</div>
    </div>

    <div class="vip-panel" id="vipSection" style="display:none;">
        <div style="padding:0 15px 10px; font-weight:bold; color:var(--gold); font-size:14px;">⭐ ТОП ПРОПОЗИЦІЇ</div>
        <div class="slider-wrapper drag-scroll" id="vipList"></div>
    </div>

    <h3 style="font-size:18px; margin: 20px 0 10px 5px;">Останні оголошення</h3>
    <div id="adsList"></div>
</div>

<div class="bottom-nav">
    <a href="javascript:void(0)" class="nav-link" onclick="alert('Інфо: Тисніть на картку для деталей.')"><span>❓</span><br>Інфо</a>
    <a href="create.html" class="nav-link add-btn">➕ ПОДАТИ</a>
    <a href="https://t.me/vic_odessa" class="nav-link"><span>👤</span><br>Адмін</a>
</div>

<div id="modalOverlay" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span onclick="closeModal()" style="position:absolute; top:20px; right:25px; font-size:30px; color:#bbb; cursor:pointer;">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let allAds = [];

    function initDragScroll() {
        const sliders = document.querySelectorAll('.drag-scroll');
        sliders.forEach(slider => {
            let isDown = false; let startX; let scrollLeft;
            slider.addEventListener('mousedown', (e) => {
                isDown = true; slider.style.cursor = 'grabbing';
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; });
            slider.addEventListener('mouseup', () => { isDown = false; });
            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });
        });
    }

    async function loadAds() {
        const header = document.querySelector('.logo-text');
        header.innerText = "⚓ ЗАВАНТАЖЕННЯ... ⚓";
        try {
            const res = await fetch('/api/ads');
            allAds = await res.json();
            header.innerText = "⚓ РОБОТА ОДЕСА ⚓";
            renderAds(allAds);
        } catch (e) {
            header.innerText = "⚠️ ПОМИЛКА МЕРЕЖІ";
            console.error(e);
        }
        initDragScroll();
    }

    function renderAds(ads) {
        const list = document.getElementById('adsList');
        const vipList = document.getElementById('vipList');
        const vipSection = document.getElementById('vipSection');
        
        list.innerHTML = '';
        vipList.innerHTML = '';
        
        // Фильтруем только те, что активны (Approved)
        const activeAds = ads.filter(a => a.status === 'active');
        
        // Более надежный фильтр
const vips = activeAds.filter(a => 
    a.isVip === true || a.isVip === 'true' || a.isVip === 1 || a.isVip === '1'
);
const regulars = activeAds.filter(a => 
    !a.isVip || a.isVip === false || a.isVip === 'false' || a.isVip === 0 || a.isVip === '0'
);

        if (vips.length > 0) {
            vipSection.style.display = 'block';
            vips.forEach(ad => {
                vipList.innerHTML += `
                <div class="vip-card" onclick="openAd('${ad.id}')">
                    <span class="vip-tag">VIP</span>
                    <div style="font-size:10px; color:var(--main); font-weight:bold;">${ad.category}</div>
                    <div style="font-weight:bold; height:38px; overflow:hidden; margin:5px 0;">${ad.vacancy}</div>
                    <div class="salary">${ad.salary} грн</div>
                </div>`;
            });
        } else { 
            vipSection.style.display = 'none'; 
        }
        
        if (regulars.length > 0) {
            regulars.forEach(ad => {
                list.innerHTML += `
                <div class="ad-card" onclick="openAd('${ad.id}')">
                    <div style="font-size:10px; color:#999; font-weight:bold; margin-bottom:5px;">${ad.category}</div>
                    <div style="font-weight:bold; font-size:17px; color:#000;">${ad.vacancy}</div>
                    <div class="salary">${ad.salary} грн</div>
                    <div style="font-size:13px; color:#777;">📍 ${ad.city} ${ad.address ? '• ' + ad.address : ''}</div>
                </div>`;
            });
        }

        if (vips.length === 0 && regulars.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">На даний момент вакансій немає</p>';
        }
    }

    function openAd(id) {
        const ad = allAds.find(a => String(a.id) === String(id));
        if(!ad) return;

        const dateStr = ad.createdAt ? new Date(ad.createdAt).toLocaleDateString() : '--';
        const authorId = ad.userId || 'Веб-користувач';

        document.getElementById('modalBody').innerHTML = `
            <div style="font-size:11px; color:var(--main); font-weight:bold; text-transform:uppercase;">${ad.category}</div>
            <h2 style="margin:10px 0 5px; line-height:1.2; font-size:22px;">${ad.vacancy}</h2>
            <div class="salary" style="font-size:22px; margin-bottom:15px;">${ad.salary} грн</div>
            
            <div style="background:#f8f9fa; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:15px;">
                <div style="white-space:pre-wrap; margin-bottom:15px; line-height:1.5;"><b>Опис:</b><br>${ad.duties}</div>
                <div style="font-size:14px; margin-bottom:5px;">📍 <b>Місто:</b> ${ad.city}</div>
                <div style="font-size:14px; margin-bottom:5px;">🕘 <b>Графік:</b> ${ad.schedule || 'За домовленістю'}</div>
                <div style="font-size:14px;">🏠 <b>Район:</b> ${ad.address || 'Уточнюйте'}</div>
            </div>

            <div style="background:#e7f3ff; padding:18px; border-radius:15px; border:1px solid #b8daff;">
                <p style="margin:0 0 12px 0; font-size:18px;">
                    📞 <b>Тел:</b> <a href="tel:${ad.phone}" style="color:var(--main); text-decoration:none; font-weight:bold;">${ad.phone || '---'}</a>
                </p>
                <div style="display:flex; gap:10px; margin-bottom:12px;">
                    ${ad.telegram ? `<a href="https://t.me/${ad.telegram.replace('@','')}" target="_blank" style="flex:1; background:#0088cc; color:white; text-decoration:none; padding:10px; border-radius:10px; text-align:center; font-size:12px; font-weight:bold;">Telegram</a>` : ''}
                    ${ad.viber ? `<a href="viber://chat?number=${ad.viber.replace('+','')}" style="flex:1; background:#7360f2; color:white; text-decoration:none; padding:10px; border-radius:10px; text-align:center; font-size:12px; font-weight:bold;">Viber</a>` : ''}
                </div>
                <p style="margin:0; font-size:16px; color:#555;">👤 <b>Контакт:</b> ${ad.person || 'Роботодавець'}</p>
            </div>

            <div style="margin-top:25px; font-size:10px; color:#bbb; border-top:1px solid #eee; padding-top:10px; display:flex; justify-content:space-between;">
                <span>KOD: #${ad.id}</span>
                <span>Дата: ${dateStr}</span>
                <span>ID: ${authorId}</span>
            </div>
            
            <button onclick="closeModal()" style="width:100%; margin-top:20px; padding:16px; border-radius:15px; border:none; background:#f0f0f0; color:#444; font-weight:bold; cursor:pointer;">Закрити</button>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = cat === 'Усі' ? allAds : allAds.filter(a => a.category === cat);
        renderAds(filtered);
    }

    function searchAds() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderAds(allAds.filter(a => a.vacancy.toLowerCase().includes(q) || a.city.toLowerCase().includes(q)));
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    loadAds();
</script>
</body>
</html>
