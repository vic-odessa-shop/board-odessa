<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Робота Одеса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* БАЗОВЫЕ СТИЛИ ДЛЯ ЛЮБОЙ ТЕМЫ */
        :root {
            --bg-color: #ffffff;
            --text-color: #222222;
            --card-bg: #f8f9fa;
            --accent-color: #007bff;
            --border-color: #ddd;
        }

        /* АДАПТАЦИЯ ПОД ТЕМУ ТЕЛЕГРАМ */
        body {
            background-color: var(--tg-theme-bg-color, var(--bg-color));
            color: var(--tg-theme-text-color, var(--text-color));
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 20px 10px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border-radius: 0 0 20px 20px;
        }

        .logo-text { font-size: 22px; margin: 0; font-weight: bold; }

        /* ПОИСК */
        .search-bar { margin-top: 15px; }
        #searchInput {
            width: 90%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        h3 { color: var(--tg-theme-text-color, #333); margin-top: 20px; }

        /* КАРТОЧКИ */
        .ads-grid { display: grid; gap: 15px; margin-top: 10px; }
        
        .ad-card {
            background: var(--tg-theme-secondary-bg-color, var(--card-bg));
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            transition: 0.2s;
        }

        .ad-card h4 { margin: 0 0 10px 0; color: var(--accent-color); font-size: 18px; }
        .ad-card p { margin: 5px 0; font-size: 15px; }
        
        .salary { font-weight: bold; color: #28a745; font-size: 17px; }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.7;
        }

        .btn-open {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #222);
            width: 95%;
            max-height: 90%;
            overflow-y: auto;
            padding: 20px;
            border-radius: 15px;
            position: relative;
            box-sizing: border-box;
        }

        .pre-wrap { 
            white-space: pre-wrap; 
            background: rgba(0,0,0,0.05); 
            padding: 10px; 
            border-radius: 8px; 
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 28px; cursor: pointer;
            opacity: 0.6;
        }

        .contacts-box {
            background: var(--tg-theme-secondary-bg-color, #f0f7ff);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border: 1px dashed var(--accent-color);
        }

        .share-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Робота для всіх — Одеса</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Пошук вакансій..." oninput="searchAds()">
        </div>
    </header>

    <div class="container">
        <h3 id="searchResultText">Останні оголошення</h3>
        <div id="adsList" class="ads-grid">
            </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allAds = [];
        const tg = window.Telegram.WebApp;
        tg.ready();

        async function loadAds() {
            try {
                const res = await fetch('/api/ads');
                allAds = await res.json();
                renderAds(allAds);
            } catch (e) {
                console.error("Помилка завантаження:", e);
            }
        }

        function renderAds(ads) {
            const list = document.getElementById('adsList');
            if (!ads.length) {
                list.innerHTML = '<p style="text-align:center; opacity:0.6;">В даній категорії поки нічого немає</p>';
                return;
            }
            
            list.innerHTML = '';
            ads.forEach(ad => {
                const card = document.createElement('div');
                card.className = `ad-card ${ad.isVip ? 'vip' : ''}`;
                card.innerHTML = `
                    <div style="font-size:11px; opacity:0.7; margin-bottom:5px;">${ad.category}</div>
                    <h4>${ad.vacancy}</h4>
                    <p class="salary">💰 ${ad.salary} грн</p>
                    <p>📍 ${ad.city}</p>
                    <div class="card-footer">
                        <span>№ ${ad.id}</span>
                        <span>🗓 ${new Date(ad.createdAt).toLocaleDateString()}</span>
                    </div>
                    <button class="btn-open" onclick="openAd('${ad.id}')">Детальніше</button>
                `;
                list.appendChild(card);
            });
        }

        function searchAds() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAds.filter(ad => 
                ad.vacancy.toLowerCase().includes(query) || 
                ad.category.toLowerCase().includes(query) ||
                (ad.duties && ad.duties.toLowerCase().includes(query))
            );
            renderAds(filtered);
            document.getElementById('searchResultText').innerText = query ? `Результат пошуку: (${filtered.length})` : 'Останні оголошення';
        }

        function openAd(id) {
            const ad = allAds.find(a => a.id === id);
            if (!ad) return;

            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <h2 style="color:var(--accent-color); font-size:20px; margin-top:0;">‼️ ПОТРІБЕН / ПРОПОНУЮ ‼️</h2>
                <p><b>🗂 Категорія:</b> ${ad.category}</p>
                <p><b>👤 Вакансія:</b> ${ad.vacancy}</p>
                <hr style="opacity:0.2">
                <div class="description">
                    <p><b>📋 Досвід та умови:</b></p>
                    <div class="pre-wrap">${ad.duties || 'Не вказано'}</div>
                </div>
                <p><b>🕘 Графік:</b> ${ad.schedule || 'Не вказано'}</p>
                <p><b>💰 Зарплата:</b> ${ad.salary} грн</p>
                <hr style="opacity:0.2">
                <p><b>📍 Місто:</b> ${ad.city}</p>
                <p><b>🏠 Адреса:</b> ${ad.address || 'Не вказано'}</p>
                
                <div class="contacts-box">
                    <p><b>📞 Телефон:</b> <a href="tel:${ad.phone}" style="color:var(--accent-color); text-decoration:none; font-weight:bold;">${ad.phone}</a></p>
                    ${ad.social ? `<p><b>🔗 Соц.мережі:</b> ${ad.social}</p>` : ''}
                    <p><b>👤 Контакт:</b> ${ad.person}</p>
                </div>
                
                <div style="font-size:12px; opacity:0.5; margin-top:15px; text-align:center;">
                    Об'ява № ${ad.id} від ${new Date(ad.createdAt).toLocaleDateString()}
                </div>
                <button class="share-btn" onclick="shareAd('${ad.vacancy}', '${ad.id}')">🔗 Поділитись вакансією</button>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function shareAd(title, id) {
            const text = `Вакансія: ${title}\nПодробиці в боті!`;
            if (navigator.share) {
                navigator.share({ title: 'Робота Одеса', text: text, url: window.location.href });
            } else {
                alert("Скопіюйте посилання на сайт та надішліть друзям!");
            }
        }

        loadAds();
    </script>
</body>
</html>
