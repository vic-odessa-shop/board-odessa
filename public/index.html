<!DOCTYPE html>

    <style>
        :root { --main: #007bff; --bg: #f4f6f9; --text: #1a1a1a; --gold: #ffc107; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        header { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 20px 15px; text-align: center; border-radius: 0 0 25px 25px; }
        .logo-text { font-size: 24px; font-weight: 800; font-style: italic; }
        
        .search-panel { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 10px; }
        .search-box { display: flex; gap: 8px; background: white; padding: 5px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; margin: 0 10px; }
        .search-box input { flex: 1; border: none; padding: 10px 15px; outline: none; font-size: 16px; border-radius: 30px; }
        .btn-search { background: var(--main); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; cursor: pointer; }

        /* DRAGGABLE SLIDER */
        .slider-wrapper { 
            display: flex; gap: 12px; padding: 10px 15px; 
            overflow-x: auto; scrollbar-width: none; 
            cursor: grab; user-select: none;
            -webkit-overflow-scrolling: touch;
        }
        .slider-wrapper:active { cursor: grabbing; }
        .slider-wrapper::-webkit-scrollbar { display: none; }

        .cat-btn { background: white; border: 1px solid #ddd; padding: 10px 18px; border-radius: 20px; white-space: nowrap; font-size: 13px; font-weight: 600; pointer-events: none; }
        /* Чтобы кнопка нажималась, но не мешала драгу, вешаем клик на родителя или через скрипт */
        .cat-item { pointer-events: auto; }

        .vip-panel { background: #fff; padding: 15px 0; margin: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .vip-card { min-width: 240px; background: #fffdf0; border: 2px solid var(--gold); border-radius: 18px; padding: 15px; position: relative; flex-shrink: 0; }
        .vip-tag { position: absolute; top: 10px; right: 10px; background: var(--gold); color: #856404; font-size: 9px; padding: 2px 6px; border-radius: 5px; font-weight: bold; }

        .container { padding: 0 15px; }
        .ad-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #eaeaea; }
        .salary { color: #28a745; font-weight: 800; font-size: 20px; margin: 8px 0; }
        
        .promo-item { background: #fff3cd; border: 1px dashed #ffc107; padding: 12px; border-radius: 15px; text-align: center; font-size: 13px; margin-bottom: 10px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-link { text-decoration: none; color: #777; font-size: 11px; text-align: center; }
        .add-btn { background: var(--main); color: white !important; padding: 10px 20px; border-radius: 25px; font-weight: bold; margin-top: -8px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-height: 85%; border-radius: 25px; padding: 25px; position: relative; overflow-y: auto; }
    </style>
</head>

<div class="container">

        <div class="promo-item">📢 <b>РЕКЛАМА №1:</b> Найкращі кав'ярні міста!</div>

    <div class="vip-panel" id="vipSection" style="display:none;">

<script>
    let allAds = [];

    // ФУНКЦИЯ DRAG-TO-SCROLL (как на OLX для мышки)
    function initDragScroll() {
        const sliders = document.querySelectorAll('.drag-scroll');
        sliders.forEach(slider => {
            let isDown = false; let startX; let scrollLeft;
            slider.addEventListener('mousedown', (e) => {
                isDown = true; slider.classList.add('active');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; });
            slider.addEventListener('mouseup', () => { isDown = false; });
            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });
        });
    }

async function loadAds() {
        try {
            const res = await fetch('/api/ads');
            if (!res.ok) throw new Error('Ошибка сервера'); // Добавляем проверку статуса
            allAds = await res.json();
        } catch (e) {
            console.error("Ошибка загрузки:", e);
            allAds = []; // Очищаем заглушки, чтобы не путать людей старыми данными
            document.getElementById('adsList').innerHTML = 
                '<p style="text-align:center; padding:20px; color:#777;">Наразі вакансій немає або виникла помилка з\'єднання. Спробуйте оновити сторінку.</p>';
        }
        renderAds(allAds);
        initDragScroll();
    }

 function renderAds(ads) {
        const list = document.getElementById('adsList');
        const vipList = document.getElementById('vipList');
        const vipSection = document.getElementById('vipSection');
        list.innerHTML = '';
        vipList.innerHTML = '';
        
        // Исправленная логика: 
        // Если isVip точно true — в VIP. Во всех остальных случаях — в обычные.
        const vips = ads.filter(a => a.isVip === true);
        const regulars = ads.filter(a => a.isVip !== true);
        
        if (vips.length > 0) {
            vipSection.style.display = 'block';
            vips.forEach(ad => {
                vipList.innerHTML += `
                <div class="vip-card" onclick="openAd('${ad.id}')">
                    <span class="vip-tag">VIP</span>
                    <div style="font-size:10px; color:var(--main); font-weight:bold;">${ad.category}</div>
                    <div style="font-weight:bold; height:38px; overflow:hidden; margin:5px 0;">${ad.vacancy}</div>
                    <div class="salary">${ad.salary} грн</div>
                </div>`;
            });
        } else { vipSection.style.display = 'none'; }
        
        // Если обычных объявлений нет, выведем надпись
        if (regulars.length === 0 && vips.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">Наразі нових вакансій немає</p>';
        }
        
        regulars.forEach(ad => {
            list.innerHTML += `
            <div class="ad-card" onclick="openAd('${ad.id}')">
                <div style="font-size:10px; color:#999; font-weight:bold; margin-bottom:5px;">${ad.category}</div>
                <div style="font-weight:bold; font-size:17px;">${ad.vacancy}</div>
                <div class="salary">${ad.salary} грн</div>
                <div style="font-size:13px; color:#777;">📍 ${ad.city} ${ad.address ? '• ' + ad.address : ''}</div>
            </div>`;
        });
    }

    function openAd(id) {
        const ad = allAds.find(a => String(a.id) === String(id));
        if(!ad) return;

        const isPending = ad.status === 'pending';
        const dateStr = ad.createdAt ? new Date(ad.createdAt).toLocaleDateString() : '--';
        const authorId = ad.userId ? ad.userId : 'Веб-користувач';

        document.getElementById('modalBody').innerHTML = `
            <div style="font-size:11px; color:var(--main); font-weight:bold; text-transform:uppercase;">${ad.category}</div>
            <h2 style="margin:10px 0 5px; line-height:1.2; font-size:22px;">${ad.vacancy}</h2>
            <div class="salary" style="font-size:22px; margin-bottom:15px;">${ad.salary} грн</div>
            
            <div style="background:#f8f9fa; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:15px;">
                <div style="white-space:pre-wrap; margin-bottom:15px; line-height:1.5;"><b>Опис / Обов'язки:</b><br>${ad.duties}</div>
                <div style="font-size:14px; margin-bottom:5px;">📍 <b>Місто:</b> ${ad.city}</div>
                <div style="font-size:14px; margin-bottom:5px;">🕘 <b>Графік:</b> ${ad.schedule || 'За домовленістю'}</div>
                <div style="font-size:14px;">🏠 <b>Адреса/Район:</b> ${ad.address || 'Уточнюйте'}</div>
            </div>
			
			

          ${isPending ? 
                `<div style="background:#fff3cd; padding:15px; border-radius:15px; text-align:center; border:1px solid #ffeeba; color:#856404;">
                    🔒 <b>Контакти приховані</b><br>
                    <small>З'являться після активації оголошення.</small>
                 </div>` : 
                `<div style="background:#e7f3ff; padding:18px; border-radius:15px; border:1px solid #b8daff;">
                    <p style="margin:0 0 12px 0; font-size:18px;">
                        📞 <b>Тел:</b> <a href="tel:${ad.phone}" style="color:var(--main); text-decoration:none; font-weight:bold;">${ad.phone || 'не вказано'}</a>
                    </p>
                    
                    <div style="display:flex; gap:10px; margin-bottom:12px;">
                        ${ad.telegram ? 
                            `<a href="https://t.me/${ad.telegram.replace('@','')}" target="_blank" style="flex:1; background:#0088cc; color:white; text-decoration:none; padding:10px; border-radius:10px; text-align:center; font-size:12px; font-weight:bold;">Telegram</a>` : ''}
                        ${ad.viber ? 
                            `<a href="viber://chat?number=${ad.viber.replace('+','')}" style="flex:1; background:#7360f2; color:white; text-decoration:none; padding:10px; border-radius:10px; text-align:center; font-size:12px; font-weight:bold;">Viber</a>` : ''}
                    </div>

                    <p style="margin:0; font-size:16px; color:#555;">👤 <b>Контакт:</b> ${ad.person || 'Роботодавець'}</p>
                 </div>`
            }


            <div style="margin-top:25px; font-size:10px; color:#bbb; border-top:1px solid #eee; padding-top:10px; display:flex; justify-content:space-between;">
                <span>KOD: #${ad.id}</span>
                <span>Дата: ${dateStr}</span>
                <span>ID: ${authorId}</span>
            </div>
            
            <button onclick="closeModal()" style="width:100%; margin-top:20px; padding:16px; border-radius:15px; border:none; background:#f0f0f0; color:#444; font-weight:bold; cursor:pointer;">Закрити</button>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = cat === 'Усі' ? allAds : allAds.filter(a => a.category === cat);
        renderAds(filtered);
    }

    function searchAds() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderAds(allAds.filter(a => a.vacancy.toLowerCase().includes(q) || a.city.toLowerCase().includes(q)));
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    loadAds();
</script>
