    <style>
      /* Чтобы рекламные карточки не падали вниз, а шли в ряд */

      :root {

      header {

      .logo-text {

      }

      .search-panel {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--bg);
        padding: 7px;
      }
      .search-box {
        display: flex;
        gap: 8px;
        background: white;
        padding: 5px;
        border-radius: 30px;

      .search-box input {
        flex: 1;
        border: none;
        padding: 1px 15px;

        border-radius: 30px;
      }
      .btn-search {
        background: var(--main);
        color: white;
        border: none;
        width: 25px;
        height: 25px;
        border-radius: 50%;
        font-size: 16px;
        cursor: pointer;

      /* СЛАЙДЕРЫ (Меню и VIP) */
      /* 1. СЛАЙДЕРЫ (Категории и VIP) */

        display: flex !important;
        gap: 12px;
        padding: 5px 15px;
        overflow-x: auto !important;

      .vip-card {

      .container {

        font-weight: 800;

      .promo-item {

      .modal {

        background: white;

      /* Разблокировка вертикального скролла */

        touch-action: pan-y !important;

      .simple-vacancy {

      /* Стили для модалки помощи */

        border-radius: 25px;
        width: 85%;
        max-width: 400px;

      }

    <script>
      function openHelp() {
const body = document.getElementById("modalBody");
const overlay = document.getElementById("modalOverlay");

body.innerHTML = `
<div class="help-modal-content">
            <h3 style="margin-top:0; color:var(--main);">⚓ Одеса-Борд: Довідка Ver2.1</h3>
            
            <div style="background: #eef7ff; padding: 12px; border-radius: 15px; border-left: 4px solid #007bff; margin-bottom: 15px; font-size: 14px;">
                🌍 <b>Ми всюди!</b> Оголошення доступні не тільки в Telegram: <a href="https://t.me/rabota_odessa_smart" target="_blank" style="color:#007bff; font-weight:bold;">rabota_odessa_smart</a>, а й за прямою адресою: 
                <br><a href="https://board-odessa.onrender.com" target="_blank" style="color:#007bff; font-weight:bold;">board-odessa.onrender.com</a> 
                <br><i style="font-size: 12px; color: #555;">Це залучає тисячі користувачів з Google, які шукають роботу прямо зараз.</i>
            </div>

            <p style="font-size:14px;"><b>1. Як подати?</b> Тисніть "+", заповнюйте форму та обирайте зручний спосіб оплати.</p>
            
            <p style="font-size:14px;"><b>2. Що таке "Очікує оплати"?</b> Це статус вашого оголошення до моменту підтвердження адміном. Вакансію вже бачать на сайті, але контакти приховані.</p>

            <p style="font-size:14px;"><b>3. Коли публікація в канал?</b> Одразу після вашої оплати та перевірки адміном оголошення стає активним і автоматично летить у наш Telegram-канал.</p>

            <p style="font-size:14px;"><b>4. Авто-підйом:</b> Ваша вакансія не «тоне»! Система сама піднімає її вгору кожні 12 або 24 години (залежно від тарифу).</p>

            <p style="font-size:14px;"><b>5. VIP-статус:</b> Бажаєте бути першим? Обирайте VIP, щоб закріпити вакансію над іншими оголошеннями.</p>
</p>
            <button onclick="closeModal()" style="width:100%; margin-top:15px; padding:16px; border-radius:15px; border:none; background:var(--main); color:#fff; font-weight:bold; cursor:pointer;">Зрозуміло!</button>
        </div>
    `;
        overlay.style.display = "flex";
      }

      function helpOn() {
        document.getElementById("payModal").style.left = "0px";
      }

      //  «Секретный переход» в admin.html 5 раз тапнут за 3 сек.
      let adminTaps = 0;
      function checkAdminTaps() {
        adminTaps++;
        if (adminTaps === 5) {
          window.location.href = "admin.html";
          adminTaps = 0;
        }
        setTimeout(() => (adminTaps = 0), 2000); // Сброс, если нажатия слишком медленные
      }

      let allAds = [];

      function initDragScroll() {
        const sliders = document.querySelectorAll(".drag-scroll");
        sliders.forEach((slider) => {
          let isDown = false;
          let startX;
          let scrollLeft;
          slider.addEventListener("mousedown", (e) => {
            isDown = true;
            slider.style.cursor = "grabbing";
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
          });
          slider.addEventListener("mouseleave", () => {
            isDown = false;
          });
          slider.addEventListener("mouseup", () => {
            isDown = false;
          });
          slider.addEventListener("mousemove", (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2;
            slider.scrollLeft = scrollLeft - walk;
          });
        });
      }

      async function loadAds() {
        await loadBanners();
        const header = document.querySelector(".logo-text");
        header.innerText = "⚓ ЗАВАНТАЖЕННЯ... ⚓";
        try {
          const res = await fetch("/api/ads");
          allAds = await res.json();
          header.innerText = "⚓ РОБОТА ОДЕСА ⚓";
          renderAds(allAds);
        } catch (e) {
          header.innerText = "⚠️ ПОМИЛКА МЕРЕЖІ";
          console.error(e);
        }
        initDragScroll();
      }

      async function loadBanners() {
        try {
          const res = await fetch("/api/banners");
          let banners = await res.json();
          if (banners.length === 0) {
            banners = [
              {
                title: "⚓ Ваша реклама тут",
                content:
                  "Бажаєте залучити клієнтів? Тисніть для зв'язку з адміном!",
                link: "https://t.me/odessa_smart_job_bot",
              },
            ];
          }
          banners.sort(() => Math.random() - 0.5);
          const list = document.getElementById("promoList");
          list.innerHTML = banners
            .map(
              (b) => `
                <div class="promo-card" onclick="window.open('${b.link}', '_blank')" 
                     style="background: white; padding:18px; border-radius:20px; border:1px solid #bbdefb; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor:pointer;">
                    <div style="font-size:9px; color:#1976d2; font-weight:bold; margin-bottom:8px; opacity:0.7;">📢 РЕКЛАМНА ПРОПОЗИЦІЯ</div>
                    <div style="font-weight:bold; font-size:17px; color:#0d47a1; margin-bottom:6px;">${b.title}</div>
                    <div style="font-size:13px; color:#444; line-height:1.4;">${b.content}</div>
                </div>
            `,
            )
            .join("");
          document.getElementById("promoSection").style.display = "block";
        } catch (e) {
          console.log("Ошибка рекламы", e);
        }
      }

      // ВОТ ЭТУ ФУНКЦИЮ МЫ ВОЗВРАЩАЕМ:
      function renderAds(ads) {
        const list = document.getElementById("adsList");
        const vipList = document.getElementById("vipList");
        const vipSection = document.getElementById("vipSection");
        let mainHtml = "";
        let vipHtml = "";

        if (!ads || ads.length === 0) {
          list.innerHTML =
            '<p style="text-align:center; padding:20px;">Вакансій не знайдено</p>';
          if (vipSection) vipSection.style.display = "none";
          return;
        }

        ads.forEach((ad) => {
          const isPending = ad.status === "pending";
          const isVip = ad.isVip === true || String(ad.isVip) === "true";

          // 1. Заголовок (Вакансия или Резюме), который мы починили в базе
          // Если вдруг в старых записях его нет, ставим заглушку "ВАКАНСІЯ"
          const headerText = ad.vacancyInOut || "НОВА ВАКАНСІЯ";

          // 2. Улучшенная плашка статуса (сделаем её чуть заметнее рамкой)
          const statusLabel = isPending
            ? `<div style="background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; margin-bottom: 8px; border: 1px solid #ffeeba; display: inline-block;">⏳ ОЧІКУЄ ОПЛАТИ</div>`
            : "";

          const html = `
        <div class="${isVip ? "vip-card" : "simple-vacancy"}" 
             onclick="openAd('${ad.id}')" 
             style="cursor:pointer; position: relative; ${isPending ? "border-left: 4px solid #ffc107; opacity: 0.9;" : ""}">
            
            ${isVip ? '<span class="vip-tag">VIP</span>' : ""}
            
            <div style="font-size: 11px; color: #007bff; font-weight: 800; margin-bottom: 4px; text-transform: uppercase;">
                ${headerText}
            </div>

            ${statusLabel}

            <div style="font-size:10px; color:#999; font-weight:bold;">${ad.category}</div>
            <div style="font-weight:bold; font-size:17px; color:#1a1a1a;">${ad.vacancy}</div>
            <div style="color:#28a745; font-weight:bold; font-size:18px; margin:8px 0;">${ad.salary}</div>
            <div style="font-size:13px; color:#777;">📍 ${ad.city}</div>
        </div>`;

          if (isVip) vipHtml += html;
          else mainHtml += html;
        });

        list.innerHTML = mainHtml;
        if (vipList) {
          vipList.innerHTML = vipHtml;
          if (vipHtml) {
            startVipRotation(); // ЗАПУСК РОТАТОРА
            initVipInteraction(); // ВКЛЮЧЕНИЕ ПАУЗЫ
          }
        }
        if (vipSection) vipSection.style.display = vipHtml ? "block" : "none";
      }

  function openAd(id) {
    // 1. Сначала находим объявление
    const ad = allAds.find(a => String(a.id) === String(id));
    if(!ad) {
        console.error("Оголошення не знайдено");
        return;
    }

    // 2. Находим элементы окна
    const overlay = document.getElementById('modalOverlay');
    const body = document.getElementById('modalBody');

    // 3. Проверяем наличие элементов
    if (!overlay || !body) {
        console.error("Елементи модалки не знайдені в DOM!");
        return;
    }

    // 4. Показываем оверлей ПЕРЕД заполнением данных
    overlay.style.display = 'flex';

    // 5. Отправляем просмотр
    fetch(`/api/ads/view/${id}`, { method: 'POST' }).catch(err => {});

    const isPending = ad.status === 'pending';
    const headerText = ad.vacancyInOut || "ОГОЛОШЕННЯ";

    // 6. Заполняем контент
    body.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">

      function filterCat(cat, btn) {
        document
          .querySelectorAll(".cat-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const filtered =
          cat === "Усі" ? allAds : allAds.filter((a) => a.category === cat);
        renderAds(filtered);
      }

      function searchAds() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        renderAds(
          allAds.filter(
            (a) =>
              a.vacancy.toLowerCase().includes(q) ||
              a.city.toLowerCase().includes(q),
          ),
        );
      }

      function closeModal() {
        document.getElementById("modalOverlay").style.display = "none";
      }

      loadAds();

      // Добавляем логику Ротатора (VIP-панель)
      let vipRotation;

      function startVipRotation() {
        const container = document.getElementById("vipList");
        if (!container || container.children.length < 2) return;

        clearInterval(vipRotation);
        vipRotation = setInterval(() => {
          const card = container.querySelector(".vip-card");
          const cardWidth = card ? card.offsetWidth + 12 : 250; // Ширина карты + gap

          // Если доскроллили до конца — в начало, иначе +1 карточка
          if (
            container.scrollLeft + container.offsetWidth >=
            container.scrollWidth - 5
          ) {
            container.scrollTo({ left: 0, behavior: "smooth" });
          } else {
            container.scrollBy({ left: cardWidth, behavior: "smooth" });
          }
        }, 5000); // Крутим каждые 5 секунд
      }

      // Пауза при взаимодействии (чтобы не уезжало из-под пальца)
      function initVipInteraction() {
        const container = document.getElementById("vipList");
        if (!container) return;

        const stop = () => clearInterval(vipRotation);
        const resume = () => startVipRotation();

        container.addEventListener("mouseenter", stop);
        container.addEventListener("mouseleave", resume);
        container.addEventListener("touchstart", stop);
        container.addEventListener("touchend", () => setTimeout(resume, 3000));
      }
    </script>
