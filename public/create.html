<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Нове оголошення</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="form-page">
    <div class="container glass">
        <div class="form-header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h3>Подати оголошення</h3>
        </div>

        <form id="adForm">
            <label>Категорія:</label>
            <select name="title" id="jobTitle" required>
                <option value="Водій">Водій</option>
                <option value="Кухар">Кухар</option>
                <option value="Продавець">Продавець</option>
                <option value="Офіс/Менеджер">Офіс / Менеджер</option>
            </select>

            <input type="text" name="salary" placeholder="Зарплата (грн)" required>
            <input type="text" name="city" value="Одеса" required>
            <textarea name="duties" placeholder="Обов’язки та умови..." required></textarea>
            <input type="tel" name="phone" placeholder="Ваш телефон" required>
            <input type="text" name="person" placeholder="Ім'я" required>

            <div class="price-block">
                <div class="vip-check">
                    <input type="checkbox" id="isVip" onchange="calcPrice()">
                    <label for="isVip">💎 VIP (+150 грн)</label>
                </div>
                <div class="total-price">До сплати: <span id="totalSum">400</span> грн</div>
            </div>

            <button type="submit" class="submit-btn">Опублікувати</button>
        </form>
    </div>

    <div id="payModal" class="modal">
        <div class="modal-content glass">
            <h4>💳 Оплата</h4>
            <p id="orderIdText"></p>
            <p>Банк: <b id="bankLabel"></b></p>
            <code id="cardNumber" style="display:block; background:#eee; padding:10px; margin:10px 0;"></code>
            <button onclick="copyCard()">📋 Копіювати картку</button>
            <p>Сума: <b id="finalSum"></b> грн</p>
            <button class="main-add-btn" onclick="tg.close()">Зрозумів</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        let prices = { d30: 400, vip: 150 };

        async function init() {
            tg.expand();
            try {
                const res = await fetch('/api/init');
                const data = await res.json();
                if(data.prices) prices = data.prices;
            } catch(e) {}
            calcPrice();
        }

        function calcPrice() {
            let sum = prices.d30;
            if (document.getElementById('isVip').checked) sum += prices.vip;
            document.getElementById('totalSum').innerText = sum;
        }

        document.getElementById('adForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.submit-btn');
            btn.disabled = true;
            btn.innerText = 'Збереження...';

            try {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);
                data.isVip = document.getElementById('isVip').checked;
                data.userId = tg.initDataUnsafe?.user?.id || 'web-user';
                data.totalSum = document.getElementById('totalSum').innerText;

                const res = await fetch('/api/ads/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const resData = await res.json();
                document.getElementById('orderIdText').innerText = `Замовлення: ${resData.id}`;
                document.getElementById('bankLabel').innerText = resData.wallet.label;
                document.getElementById('cardNumber').innerText = resData.wallet.number;
                document.getElementById('finalSum').innerText = data.totalSum;
                document.getElementById('payModal').style.display = 'block';
            } catch (err) {
                alert('Помилка сервера. Спробуйте ще раз.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Опублікувати';
            }
        };

        function copyCard() {
            navigator.clipboard.writeText(document.getElementById('cardNumber').innerText);
            tg.showAlert('Копійовано!');
        }
        init();
    </script>
</body>
</html>
