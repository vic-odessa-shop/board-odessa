<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подати оголошення</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <h2>Робота для всіх - Одеса</h2>
        <p class="subtitle">Створення оголошення</p>

        <form id="adForm">
            <div class="form-group">
                <select id="category" required>
                    <option value="" disabled selected>Оберіть категорію</option>
                    <option>Фінанси, банк</option>
                    <option>Автобізнес - Сервіс</option>
                    <option>Ремонт</option>
                    <option>Клінінг</option>
                    <option>Медицина, фармацевтика</option>
                    <option>IT, комп'ютери</option>
                    <option>Охорона - Безпека</option>
                    <option>Ресторани - Кафе</option>
                    <option>Разові роботи</option>
                    <option>Інше</option>
                </select>
            </div>

            <div class="form-group">
                <input type="text" id="vacancy" placeholder="Назва вакансії (напр. Водій)" required>
            </div>

            <hr class="divider">

            <div class="form-group">
                <textarea id="duties" placeholder="📋 Досвід, обов’язки та умови" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <input type="text" id="schedule" placeholder="🗓 🕘 Графік роботи" required>
            </div>

            <div class="form-group">
                <input type="text" id="salary" placeholder="💰 Зарплата (грн)" required>
            </div>

            <div class="form-group">
                <input type="text" id="city" placeholder="📍 Місто (за замовчуванням Одеса)" value="Одеса">
            </div>

            <div class="form-group">
                <input type="text" id="address" placeholder="Адреса (вулиця, район)">
            </div>

            <div class="form-group">
                <input type="tel" id="phone" placeholder="📞 Телефон (067...)" required>
            </div>

            <div class="form-group">
                <input type="text" id="social" placeholder="🔗 Посилання на соц.мережі / Месенджери">
            </div>

            <div class="form-group">
                <input type="text" id="person" placeholder="👤 Контактна особа (Ім'я)" required>
            </div>

            <hr class="divider">

            <div class="form-group">
                <select id="tariff" required>
                    <option value="trial">Пробний (7 днів / 1 пост) - 150 грн</option>
                    <option value="standard" selected>Стандарт (30 днів / 1 пост) - 400 грн</option>
                    <option value="turbo">Турбо (30 днів / 7 постів) - 800 грн</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Оплатити та опублікувати</button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('adForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Перевірка...";

            const formData = {
                category: document.getElementById('category').value,
                vacancy: document.getElementById('vacancy').value,
                duties: document.getElementById('duties').value,
                schedule: document.getElementById('schedule').value,
                salary: document.getElementById('salary').value,
                city: document.getElementById('city').value || "Одеса",
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value,
                social: document.getElementById('social').value,
                person: document.getElementById('person').value,
                tariff: document.getElementById('tariff').value,
                userId: tg.initDataUnsafe?.user?.id || "browser_user"
            };

            try {
                const res = await fetch('/api/ads/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                const result = await res.json();
                
                if (res.ok) {
                    if (tg.initData) {
                        tg.showAlert("Оголошення надіслано на модерацію! Очікуйте активації.");
                        tg.close();
                    } else {
                        alert("Оголошення надіслано! Дякуємо.");
                        window.location.href = "/";
                    }
                } else {
                    alert(result.error || "Помилка сервера");
                    btn.disabled = false;
                    btn.innerText = "Оплатити та опублікувати";
                }
            } catch (err) {
                alert("Помилка мережі");
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
