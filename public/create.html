<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подати оголошення</title>
    <style>
        body { background: white !important; color: #222 !important; font-family: sans-serif; padding: 15px; margin: 0; }
        .back-btn { display: inline-block; margin-bottom: 15px; color: #007bff; text-decoration: none; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; }
        
        #payModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:3000; }
        .pay-content { background:white; padding:25px; border-radius:20px; width:85%; max-width:400px; text-align: center; }
    </style>
</head>
<body>

<a href="/" class="back-btn">← На головну</a>
<h2 style="margin-top:0;">Нова вакансія</h2>

<form id="addForm">
    <div class="form-group">
        <label>Категорія</label>
        <select id="category">
            <option>Водії</option><option>Ремонт</option><option>IT</option><option>Інше</option>
        </select>
    </div>
    <div class="form-group">
        <input type="text" id="vacancy" placeholder="Назва вакансії" required>
    </div>
    <div class="form-group">
        <textarea id="duties" placeholder="Обов'язки та умови (тел. писати не можна!)" rows="4" required></textarea>
    </div>
    <div class="form-group">
        <input type="text" id="salary" placeholder="Зарплата (грн)" required>
    </div>
    <div class="form-group">
        <input type="tel" id="phone" placeholder="Ваш телефон для контактів" required>
    </div>
    <div class="form-group">
        <label>Оберіть тариф</label>
        <select id="tariff">
            <option value="trial">Пробний - 150 грн (7 днів)</option>
            <option value="standard">Стандарт - 400 грн (30 днів)</option>
            <option value="turbo">Турбо - 800 грн (30 днів / 7 постів)</option>
        </select>
    </div>
    <div class="form-group">
        <label>Спосіб оплати</label>
        <select id="payMethod">
            <option value="card">Карта Monobank</option>
            <option value="crypto">Криптовалюта (USDT)</option>
        </select>
    </div>
    <button type="submit" id="submitBtn">Опублікувати та перейти до оплати</button>
</form>

<div id="payModal">
    <div class="pay-content">
        <h3 style="color:#007bff; margin-top:0;">Оплата замовлення</h3>
        <div id="payDetails" style="background:#f8f9fa; padding:15px; border-radius:10px; margin:15px 0; font-family:monospace; font-size:16px;"></div>
        <p style="font-size:13px; color:#666;">Зробіть переказ та надішліть скріншот адміну. Оголошення з'явиться на дошці миттєво, а контакти — після підтвердження.</p>
        <button onclick="location.href='/'">Я оплатив, на головну</button>
    </div>
</div>

<script>
    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Збереження...";

        const data = {
            category: document.getElementById('category').value,
            vacancy: document.getElementById('vacancy').value,
            duties: document.getElementById('duties').value,
            salary: document.getElementById('salary').value,
            phone: document.getElementById('phone').value,
            tariff: document.getElementById('tariff').value,
            person: "Замовник",
            city: "Одеса",
            userId: window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 'guest'
        };

        const res = await fetch('/api/ads/create', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if (res.ok) {
            const method = document.getElementById('payMethod').value;
            const details = method === 'card' ? '💳 4441 0000 0000 0000\nМонабанк' : '🌐 USDT (TRC20):\nВаш_Адреса_Тут';
            document.getElementById('payDetails').innerText = details;
            document.getElementById('payModal').style.display = 'flex';
        } else {
            alert("Помилка при створенні. Перевірте поля.");
            btn.disabled = false; btn.innerText = "Спробувати ще раз";
        }
    };
</script>
</body>
</html>
