<script>
// Загрузка тарифов 
async function loadTariffs() {
    try {
        const response = await fetch('/api/pub/tariffs');
        const allTariffs = await response.json();

        // 1. Ищем VIP (теперь ищем по ключу label или isVip)
        const vipData = allTariffs.find(t => t.isVip === true || t.label === 'VIP');
        const vipPrice = vipData ? parseInt(vipData.price) : 150;

        const vipCheckbox = document.getElementById('isVip');
        if (vipCheckbox) {
            vipCheckbox.setAttribute('data-price', vipPrice);
            vipCheckbox.onchange = calcPrice;
        }

        // 2. Остальные тарифы (исключаем VIP)
        const regularTariffs = allTariffs.filter(t => !t.isVip && t.label !== 'VIP')
                                         .sort((a, b) => (parseInt(a.price) || 0) - (parseInt(b.price) || 0));

        const select = document.getElementById('tariff');
        if (!select) return;
        select.innerHTML = '';
        select.onchange = calcPrice;

                        regularTariffs.forEach((tariff, index) => {
            const option = document.createElement('option');
            
            // ВАЖНО: берем именно tariff.id (сервер ждет его)
            const tariffId = tariff.id; 
            const name = tariff.label || 'Безкоштовно';
            const price = tariff.price || 0;
            
            option.value = tariffId; // Теперь улетит то, что хочет findOne({ id: ... })
            option.setAttribute('data-price', price);
            
            option.textContent = name + ' - ' + price + ' грн';
            if (index === 0) option.selected = true;
            select.appendChild(option);
        });



        calcPrice();
    } catch (error) {
        console.error('Помилка:', error);
    }
}

// Улучшенная проверка на номера телефонов (UA-коды)
function containsForbiddenContact(text) {
    if (!text) return false;
    // Регулярка для UA номеров и ссылок
    const phoneRegex = /(?:0|380|\+380|8)\s?\(?(?:50|66|95|99|67|68|96|97|98|63|73|93|44|48)\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}/g;
    const linkRegex = /(https?:\/\/|www\.|[\w.-]+\.(?:com|ua|net|org|biz|info|me|io))/gi;
    return phoneRegex.test(text) || linkRegex.test(text);
}

// Скрипт загрузки методов оплаты    
async function loadPaymentMethods() {
    try {
        const res = await fetch('/api/active-pay-methods');
        const methods = await res.json();
        const select = document.getElementById('payMethod');
        const group = document.getElementById('payMethodGroup');

        if (methods.length > 0) {
            select.innerHTML = methods.map(m => `<option value="${m}">${m}</option>`).join('');
            group.style.display = 'block'; // Показываем блок, если есть хоть один метод
        } else {
            // Если в админке всё выключено — пишем предупреждение
            group.innerHTML = '<p style="color:red; font-size:12px;">⚠️ Оплата тимчасово недоступна, зверніться до адміна</p>';
            group.style.display = 'block';
        }
    } catch (e) {
        console.error("Ошибка загрузки методов оплаты", e);
    }
}

// Вычисление цены 
function calcPrice() {
    const select = document.getElementById('tariff');
    const totalSumElement = document.getElementById('totalSum');
    const vipCheckbox = document.getElementById('isVip');
    const submitBtn = document.querySelector('button[type="submit"]');

    if (!totalSumElement || !select || !vipCheckbox) return;

    const selectedOption = select.options[select.selectedIndex];
    const base = selectedOption ? (parseInt(selectedOption.getAttribute('data-price')) || 0) : 0;
    
    const vPrice = parseInt(vipCheckbox.getAttribute('data-price')) || 0;
    const vip = vipCheckbox.checked ? vPrice : 0;

    const total = base + vip;
    totalSumElement.innerText = total;

    if (submitBtn) {
        submitBtn.innerText = total === 0 ? 'Опублікувати безкоштовно' : 'Оплатити та опублікувати (' + total + ' грн)';
    }
}
