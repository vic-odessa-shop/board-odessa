<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подати оголошення ⚓</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main: #007bff; --bg: #f4f6f9; --text: #222; --gold: #ffc107; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--main); text-decoration: none; font-weight: bold; font-size: 14px; }
        .form-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color: #666; }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f3f3f3; outline: none; }
        .price-block { background: #fff8e1; padding: 15px; border-radius: 12px; border: 1px dashed var(--gold); margin: 20px 0; }
        button#submitBtn { width: 100%; padding: 18px; background: var(--main); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #payModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:3000; backdrop-filter: blur(5px); }
        .pay-content { background:white; padding:30px; border-radius:25px; width:85%; max-width:400px; text-align: center; }
    </style>
</head>
<body>

<a href="/" class="back-btn">← На головну</a>

<div class="form-card">
    <h2>Нова вакансія</h2>
    <form id="addForm">
        <div class="form-group">
            <label>Категорія</label>
            <select id="category">
                <option>Автобізнес - Сервісне обслуговування</option>
                <option>Банки, Фінанси</option>
                <option>Медицина, фармацевтика</option>
                <option>Нерухомість</option>
                <option>IT, комп'ютери, інтернет</option>
                <option>Охорона - Безпека</option>
                <option>Клінінг</option>
                <option>Ресторани - Кафе</option>
                <option>Ремонт</option>
                <option>Торгівля</option>
                <option>Інше</option>
            </select>
        </div>

        <div class="form-group"><input type="text" id="vacancy" placeholder="Назва вакансії" required></div>
        <div class="form-group"><textarea id="duties" placeholder="📋 Опис та обов'язки..." rows="4" required></textarea></div>
        <div class="form-group"><input type="text" id="schedule" placeholder="🗓 Графік (напр. 2/2)"></div>
        <div class="form-group"><input type="text" id="salary" placeholder="💰 Зарплата (текстом)" required></div>
        <div class="form-group"><input type="text" id="city" placeholder="📍 Місто" value="Одеса"></div>
        <div class="form-group"><input type="text" id="address" placeholder="🏠 Район"></div>
        <div class="form-group"><input type="tel" id="phone" placeholder="📞 Телефон" required></div>
        
        <div style="display:flex; gap:10px;" class="form-group">
            <input type="text" id="tg_user" placeholder="✈️ TG @">
            <input type="text" id="viber_user" placeholder="🟣 Viber">
        </div>

        <div class="form-group">
            <input type="text" id="person" placeholder="👤 Ваше ім'я (Контактна особа)" required>
        </div>

        <div class="form-group">
            <label>Тариф</label>
            <select id="tariff" onchange="calcPrice()">
                <option value="150">Пробний (7 днів) - 150 грн</option>
                <option value="400" selected>Стандарт (30 днів) - 400 грн</option>
                <option value="800">Турбо (30 днів) - 800 грн</option>
            </select>
        </div>

        <div class="price-block">
            <input type="checkbox" id="isVip" onchange="calcPrice()"> 💎 VIP (+150 грн)
            <div style="font-size:18px; font-weight:800; margin-top:10px;">До сплати: <span id="totalSum">400</span> грн</div>
        </div>

        <button type="submit" id="submitBtn">Опублікувати та до оплати</button>
    </form>
</div>

<div id="payModal">
    <div class="pay-content">
        <h3>💳 Оплата</h3>
        <div id="payDetails" style="background:#f8f9fa; padding:15px; border-radius:12px; margin:15px 0; font-family:monospace; text-align:left; white-space:pre-wrap;"></div>
        <button onclick="location.href='/'" style="width:100%; padding:15px; background:var(--main); color:white; border:none; border-radius:12px;">Я оплатив</button>
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp;
    function calcPrice() {
        const base = parseInt(document.getElementById('tariff').value);
        const vip = document.getElementById('isVip').checked ? 150 : 0;
        document.getElementById('totalSum').innerText = base + vip;
    }

    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;

        const data = {
            category: document.getElementById('category').value,
            vacancy: document.getElementById('vacancy').value,
            duties: document.getElementById('duties').value,
            schedule: document.getElementById('schedule').value || "За домовленістю",
            salary: document.getElementById('salary').value,
            city: document.getElementById('city').value || "Одеса",
            address: document.getElementById('address').value || "Уточнюйте",
            phone: document.getElementById('phone').value,
            telegram: document.getElementById('tg_user').value,
            viber: document.getElementById('viber_user').value,
            person: document.getElementById('person').value,
            tariff: document.getElementById('tariff').value,
            isVip: document.getElementById('isVip').checked,
            userId: tg?.initDataUnsafe?.user?.id || 'web'
        };

        const res = await fetch('/api/ads/create', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if(res.ok) {
            document.getElementById('payDetails').innerText = `🆔 КОД: ${result.id}\n💰 СУМА: ${result.price} грн\n💳 ${result.payment}`;
            document.getElementById('payModal').style.display = 'flex';
        }
    };
</script>
</body>
</html>
