<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель ⚓</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 0; margin: 0; padding-bottom: 80px; }
        .toolbar { position: sticky; top: 0; z-index: 100; background: #007bff; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
        .card { background: white; padding: 15px; margin: 12px; border-radius: 12px; border-left: 6px solid #ccc; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card.active { border-left-color: #28a745; }
        .card.pending { border-left-color: #ffc107; }
        .card.vip { background: #fffdf0; border-left-color: #d4af37; }
        .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { grid-column: span 2; }
        .btn-save { background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; flex: 2; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 12px; border-radius: 8px; flex: 0 0 50px; }
        .cb-container { position: absolute; top: 15px; right: 15px; transform: scale(1.5); }
        .info { font-size: 11px; color: #666; margin-top: 10px; line-height: 1.4; border-top: 1px solid #eee; padding-top: 8px; }
    </style>
</head>
<body>

    <div class="toolbar" id="main-toolbar" style="display:none;">
        <span id="counter" style="font-weight:bold;">Обрано: 0</span>
        <button onclick="repostSelected()" id="repostBtn" style="background:white; color:#007bff; border:none; padding:8px 15px; border-radius:20px; font-weight:bold; display:none;">🚀 В КАНАЛ</button>
        
        <button onclick="showBannersEditor()" style="background:#ff9800; color:white; border:none; padding:8px 15px; border-radius:20px; font-weight:bold; margin-left:10px;">📢 Реклама</button>

        
        <button onclick="localStorage.removeItem('admin_key'); location.reload();" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:8px; border-radius:5px; font-size:10px;">Вихід</button>
    </div>

    <div id="auth" style="display:none; padding:40px 20px; text-align:center;">
        <input type="password" id="pw" placeholder="Пароль">
        <button onclick="login()" style="width:100%; margin-top:10px; padding:15px; background:#007bff; color:white; border:none; border-radius:8px;">Увійти</button>
    </div>

    <div id="list"></div>

<script>
    const adminKey = localStorage.getItem('admin_key');
    let selectedIds = new Set();

    if (!adminKey) { document.getElementById('auth').style.display = 'block'; } else { fetchAds(); }

    function login() { localStorage.setItem('admin_key', document.getElementById('pw').value); location.reload(); }

    async function fetchAds() {
        const res = await fetch('/api/admin/all-ads', { headers: { 'x-admin-key': adminKey } });
        if (!res.ok) { localStorage.removeItem('admin_key'); location.reload(); return; }
        
        const ads = await res.json();
        document.getElementById('main-toolbar').style.display = 'flex';
        const list = document.getElementById('list');
        list.innerHTML = "";

        ads.forEach(ad => {
            const isVip = ad.isVip === true || String(ad.isVip) === 'true';
            list.innerHTML += `
                <div class="card ${ad.status} ${isVip ? 'vip' : ''}" id="card-${ad.id}">
                    <div class="cb-container">
                        <input type="checkbox" onchange="toggleSelect('${ad.id}', this.checked)">
                    </div>
                    <b>#${ad.id}</b> | ${ad.category}
                    <div class="edit-grid">
                        <input type="text" id="vac-${ad.id}" value="${ad.vacancy}">
                        <input type="text" id="sal-${ad.id}" value="${ad.salary}">
                        <select id="stat-${ad.id}">
                            <option value="active" ${ad.status === 'active' ? 'selected' : ''}>Active</option>
                            <option value="pending" ${ad.status === 'pending' ? 'selected' : ''}>Pending</option>
                        </select>
                        <select id="vip-${ad.id}">
                            <option value="false" ${!isVip ? 'selected' : ''}>Обычное</option>
                            <option value="true" ${isVip ? 'selected' : ''}>VIP ⭐</option>
                        </select>
                    </div>
                    <textarea id="dut-${ad.id}" rows="2">${ad.duties || ''}</textarea>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn-save" onclick="saveAd('${ad.id}')">💾 Зберегти</button>
                        <button class="btn-del" onclick="deleteAd('${ad.id}')">🗑</button>
                    </div>
                    <div class="info">
                        📅 ${new Date(ad.createdAt).toLocaleDateString()} | 💰 ${ad.tariff || '—'} | ⌛ ${ad.expireAt ? new Date(ad.expireAt).toLocaleDateString() : '∞'}<br>
                        📱 ${ad.phone} | User: ${ad.userId || 'web'}
                    </div>
                </div>`;
        });
    }

    function toggleSelect(id, checked) {
        if(checked) selectedIds.add(id); else selectedIds.delete(id);
        document.getElementById('counter').innerText = `Обрано: ${selectedIds.size}`;
        document.getElementById('repostBtn').style.display = selectedIds.size > 0 ? 'block' : 'none';
    }

    async function saveAd(id) {
        const data = {
            vacancy: document.getElementById(`vac-${id}`).value,
            salary: document.getElementById(`sal-${id}`).value,
            status: document.getElementById(`stat-${id}`).value,
            isVip: document.getElementById(`vip-${id}`).value === 'true',
            duties: document.getElementById(`dut-${id}`).value
        };
        const res = await fetch('/api/admin/update/' + id, {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
            body: JSON.stringify(data)
        });
        if(res.ok) alert('Збережено!');
    }

    async function repostSelected() {
        if(!confirm(`Опублікувати обрані (${selectedIds.size} шт.)?`)) return;
        const res = await fetch('/api/admin/repost-batch', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
            body: JSON.stringify({ ids: Array.from(selectedIds) })
        });
        if(res.ok) { alert('🚀 Опубліковано!'); location.reload(); }
    }

    async function deleteAd(id) {
        if(confirm('Видалити?')) {
            await fetch('/api/admin/delete/'+id, { method:'DELETE', headers:{'x-admin-key':adminKey} });
            document.getElementById('card-'+id).remove();
        }
    }
    
    async function showBannersEditor() {
    const title = prompt("Заголовок реклами (напр. СТО АвтоСвіт):");
    if (!title) return;
    const content = prompt("Текст реклами:");
    const link = prompt("Посилання (https://t.me/...):");

    const res = await fetch('/api/admin/banners/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ title, content, link })
    });

    if (res.ok) {
        alert('✅ Рекламу додано! Оновіть головну сторінку.');
    } else {
        alert('❌ Помилка збереження');
    }
}

    
</script>
</body>
</html>
